# Markdown 渲染
[markup]
  [markup.highlight]
    codeFences = true
    noClasses = false
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# 输出格式
[outputs]
  home = ["HTML", "RSS", "archives", "offline", "search"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML", "RSS"]

[taxonomies]
  category = "categories"
  tag = "tags"
  collection = "collections"
