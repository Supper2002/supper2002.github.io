baseURL = "/"
defaultContentLanguage = "zh-cn"
title = "Hello Supper2002"
theme = "FixIt"
enableGitInfo = true
hasCJKLanguage = true
buildFuture = true
# 图密集的文章（如算竞退役作文，单篇 30+ 张图）在 CI 上会触发 1m 默认超时
timeout = "5m"

[params]
  version = "0.4.X"
  description = "我的个人博客"
  keywords = ["Hugo", "FixIt", "博客"]
  defaultTheme = "auto"
  dateFormat = "2006-01-02"
  summaryPlainify = true
  # 主内容 section，归档页/RSS/相关文章都依赖它（缺失会导致归档页空白）
  mainSections = ["posts"]

  [params.author]
    name = "Supper2002"
    email = ""
    link = "https://github.com/Supper2002"
    avatar = "/images/avatar.jpg"

  [params.header]
    desktopMode = "sticky"
    mobileMode = "auto"
    [params.header.title]
      logo = "/images/avatar.jpg"
      name = "Supper2002"
      pre = ""
      post = ""
      typeit = false

  [params.footer]
    enable = true
    copyright = true
    author = true
    since = "2020"
    [params.footer.powered]
      enable = true
      hugoLogo = true
      themeLogo = false

  [params.search]
    enable = true
    type = "fuse"
    contentLength = 4000
    placeholder = ""
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    absoluteURL = false
    [params.search.fuse]
      isCaseSensitive = false
      minMatchCharLength = 2
      findAllMatches = false
      location = 0
      threshold = 0.3
      distance = 100
      ignoreLocation = false

  [params.home]
    [params.home.banner]
      enable = true
      image = "/images/banner.jpg"
      title = "Supper2002"
      subtitle = ""
    [params.home.profile]
      enable = false
      avatarURL = "/images/avatar.jpg"
      title = ""
      subtitle = "欢迎来到我的个人博客"
      typeit = true
      social = true
      disclaimer = ""
    [params.home.posts]
      enable = false
      paginate = 6

  [params.archives]
    paginate = 20
    dateFormat = "01-02"

  [params.section]
    paginate = 20
    dateFormat = "01-02"

  [params.list]
    paginate = 6
    dateFormat = "01-02"

  [params.social]
    GitHub = "https://github.com/Supper2002"
    Email = ""
    RSS = true

  [params.cookieconsent]
    enable = true

  [params.busuanzi]
    enable = true
    source = "https://vercount.one/js"
    siteViews = true
    pageViews = true

  [params.page]
    lightgallery = false
    showLastmod = true
    wordCount = true
    readingTime = true
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
      position = "right"
    [params.page.math]
      enable = true
      type = "katex"
    [params.page.share]
      enable = true
      Weibo = true
      Twitter = true
      Facebook = true
    [params.page.comment]
      enable = true
      # FixIt 0.2.14 | Giscus 评论（基于 GitHub Discussions）
      [params.page.comment.giscus]
        enable = true
        repo = "Supper2002/supper2002.github.io"
        repoId = "R_kgDOS2n2oQ"
        category = "Announcements"
        categoryId = "DIC_kwDOS2n2oc4C_TYe"
        mapping = "pathname"
        origin = "https://giscus.app"
        strict = "0"
        term = ""
        reactionsEnabled = "1"   # 开启表情反应（👍❤️🚀等，Giscus 自带）
        emitMetadata = "0"
        inputPosition = "bottom"
        lang = "zh-CN"
        lightTheme = "light"
        darkTheme = "dark_dimmed"
        lazyLoad = true

  # 图片优化：自动转 WebP、压缩、生成响应式 srcset
  [params.image]
    optimise = true

  [params.codeblock]
    wrapper = true
    mode = "mac"
    maxShownLines = 10
    copyable = true

