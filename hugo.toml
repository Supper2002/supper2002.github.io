baseURL = "/"
defaultContentLanguage = "zh-cn"
title = "Hello Supper2002"
theme = "FixIt"
enableGitInfo = true
hasCJKLanguage = true

[params]
  version = "0.4.X"
  description = "我的个人博客"
  keywords = ["Hugo", "FixIt", "博客"]
  defaultTheme = "auto"
  dateFormat = "2006-01-02"

  [params.author]
    name = ""
    email = ""
    link = ""
    avatar = ""

  [params.header]
    desktopMode = "sticky"
    mobileMode = "auto"
    [params.header.title]
      logo = "/images/avatar.jpg"
      name = "Supper2002"
      pre = ""
      post = ""
      typeit = false

  [params.footer]
    enable = true
    copyright = true
    author = true
    since = "2020"
    [params.footer.powered]
      enable = true
      hugoLogo = true
      themeLogo = true

  [params.search]
    enable = true
    type = "fuse"
    contentLength = 4000
    placeholder = ""
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    absoluteURL = false
    [params.search.fuse]
      isCaseSensitive = false
      minMatchCharLength = 2
      findAllMatches = false
      location = 0
      threshold = 0.3
      distance = 100
      ignoreLocation = false

  [params.home]
    [params.home.profile]
      enable = true
      avatarURL = "/images/avatar.jpg"
      title = ""
      subtitle = "欢迎来到我的个人博客"
      typeit = true
      social = true
      disclaimer = ""
    [params.home.posts]
      enable = true
      paginate = 6

  [params.archives]
    paginate = 20
    dateFormat = "01-02"

  [params.section]
    paginate = 20
    dateFormat = "01-02"

  [params.list]
    paginate = 20
    dateFormat = "01-02"

  [params.social]
    GitHub = ""
    Email = ""
    RSS = true

  [params.cookieconsent]
    enable = true

  [params.page]
    lightgallery = false
    showLastmod = true
    wordCount = true
    readingTime = true
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
      position = "right"
    [params.page.math]
      enable = true
      type = "katex"
    [params.page.share]
      enable = true
      Weibo = true
      Twitter = true
      Facebook = true
    [params.page.comment]
      enable = false

  [params.codeblock]
    wrapper = true
    mode = "mac"
    maxShownLines = 10
    copyable = true

